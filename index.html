<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>BTC On-Chain Signal Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body, #root { margin: 0; padding: 0; height: 100%; width: 100%; background: #F7F8FA; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #111827; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }
  #loading { display: flex; align-items: center; justify-content: center; height: 100vh; color: #4B5563; font-size: 14px; flex-direction: column; gap: 12px; }
  #loading .spinner { width: 32px; height: 32px; border: 3px solid #E5E7EB; border-top-color: #2BA6DE; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="root">
  <div id="loading">
    <div class="spinner"></div>
    <div>Loading BTC On-Chain Signal Engine...</div>
  </div>
</div>
<script src="bundle.js?v=1"></script>
</body>
</html>
